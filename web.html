<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMania</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#fff8f0;
        }

        .navbar{
            background:#ff6b35;
            color:white;
            padding:20px;
            text-align:center;
            font-size:32px;
            font-weight:bold;
        }

        .container{
            width:90%;
            margin:auto;
            text-align:center;
            margin-top:40px;
        }

        form{
            margin-bottom:40px;
        }

        input{
            width:300px;
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            padding:12px 20px;
            border:none;
            border-radius:10px;
            background:#ff6b35;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#e85a2a;
        }

        .card-container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:25px;
        }

        .card{
            background:white;
            width:250px;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .card h3{
            padding:15px;
            color:#333;
        }

        .footer{
            margin-top:50px;
            padding:20px;
            text-align:center;
            background:#ff6b35;
            color:white;
        }

    </style>

</head>
<body>

    <div class="navbar">
        MovieMania
    </div>

    <div class="container">

        <h1>Find Similar Movies </h1>

        <form method="POST">

            <input 
                type="text" 
                name="food" 
                placeholder="Enter food name..."
                required
            >

            <button type="submit">
                Recommend
            </button>

        </form>

        <div class="card-container">

            {% for food in recommendations %}

            <div class="card">

                <img src="{{ food.image }}" alt="food image">

                <h3>{{ new_data.name }}</h3>

            </div>

            {% endfor %}

        </div>

    </div>

    <div class="footer">
        Made with ❤️ using Flask & Machine Learning
    </div>

</body>
</html>
